name: Daily Petitions Scraping

on:
  schedule:
    # Tous les jours à minuit UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permet de lancer le job manuellement depuis l'interface GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run petitions scraper
        run: npm run automation:petitions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
